name: Build Android APK

on:
  push:
    branches: [feat/android-app]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mystery-hunter-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # Release with signing — requires GitHub Secrets:
  #   ANDROID_SIGNING_KEY, ANDROID_KEY_ALIAS,
  #   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD
  release:
    if: github.ref == 'refs/heads/main' && vars.ANDROID_SIGNING_KEY != ''
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: mystery-hunter-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
